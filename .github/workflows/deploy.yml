name: CI — Ingestion Service

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install boto3 pytest
      - run: python -m pytest tests/ -v

  # Deploy is handled by veraagents/.github/workflows/deploy.yml
  # which clones this repo, writes .env, sets up cron, and starts the API.
