name: Contract Tests (Nightly)

on:
  schedule:
    - cron: '0 6 * * *'  # 6am UTC daily
  workflow_dispatch: {}

jobs:
  contract:
    name: Live API Contract Tests
    runs-on: ubuntu-latest
    env:
      CI_CONTRACT: 'true'
      WARM_ROLE_ARN: ${{ secrets.WARM_ROLE_ARN }}
      WARM_INSTANCE_ARN: ${{ secrets.WARM_INSTANCE_ARN }}
      WARM_EXTERNAL_ID: ${{ secrets.WARM_EXTERNAL_ID }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-east-1
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install boto3 pytest
      - run: python -m pytest tests/contract/ --contract -v
