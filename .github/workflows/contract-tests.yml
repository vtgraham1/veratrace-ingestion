name: Contract Tests (Nightly)

on:
  schedule:
    - cron: '0 6 * * *'  # 6am UTC daily
  workflow_dispatch: {}

jobs:
  contract:
    name: Live API Contract Tests
    runs-on: ubuntu-latest
    env:
      CI_CONTRACT: 'true'
      WARM_ROLE_ARN: ${{ secrets.WARM_ROLE_ARN }}
      WARM_INSTANCE_ARN: ${{ secrets.WARM_INSTANCE_ARN }}
      WARM_EXTERNAL_ID: ${{ secrets.WARM_EXTERNAL_ID }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-east-1
      # Registry test fixtures (non-secret UUIDs). Set as repo variables, not secrets.
      # Without these, tests/contract/test_integration_accounts_registry.py silently
      # skips and the Phase 1 cutover gate stops gating anything.
      KNOWN_GOOD_INSTANCE_ID: ${{ vars.KNOWN_GOOD_INSTANCE_ID }}
      KNOWN_GOOD_AC_ACCOUNT_ID: ${{ vars.KNOWN_GOOD_AC_ACCOUNT_ID }}
      # Supabase credentials so registry + sync_runs live tests can reach the
      # database instead of erroring on URL construction. URL is public (stored
      # as a variable); service role key is a secret. Without these, tests
      # failed with "unknown url type: '/rest/v1/...'" — correct gate, wrong
      # symptom. Let them hit the real Supabase and fail for the real reason.
      SUPABASE_URL: ${{ vars.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: pip install boto3 pytest
      - run: python -m pytest tests/contract/ --contract -v
